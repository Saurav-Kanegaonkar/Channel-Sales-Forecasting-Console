<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Channel Sales Forecasting Console</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="forecast-pack">
    <header class="forecast-header">
      <p class="label">Sales Planning Scenario Pack</p>
      <h1>Channel Sales Forecasting Console</h1>
      <p>Test how promotion response, territory coverage, and compensation risk change the forecast before the monthly sales planning meeting.</p>
    </header>
    <section class="scenario-panel">
      <article class="scenario-controls">
        <p class="label">Scenario controls</p>
        <button data-scenario="base" class="active">Base plan</button>
        <button data-scenario="promo">Promotion push</button>
        <button data-scenario="coverage">Territory rebalance</button>
      </article>
      <article class="forecast-card">
        <p class="label">Forecast outcome</p>
        <h2 id="scenario-name"></h2>
        <div id="forecast-metrics" class="forecast-metrics"></div>
      </article>
    </section>
    <section class="territory-grid" id="territories"></section>
    <section class="briefing">
      <article>
        <p class="label">What the data says</p>
        <div id="insights"></div>
      </article>
      <article>
        <p class="label">Sales recommendation</p>
        <div id="recommendations"></div>
      </article>
    </section>
  </main>
  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
