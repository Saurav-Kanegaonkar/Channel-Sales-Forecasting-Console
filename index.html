<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Channel Sales Forecasting Console</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Channel sales analytics</p>
        <h1>Channel Sales Forecasting Console</h1>
        <p class="lede">A decision console for distributor and dealer sales planning, forecast quality, promotion ROI, incentive exposure, and territory coverage.</p>
      </div>
      <div class="status-strip" aria-label="Planning status">
        <span>Monthly readout</span>
        <strong>Action queue ready</strong>
      </div>
    </header>

    <section class="control-bar" aria-label="Console controls">
      <div class="tabs" role="tablist" aria-label="Console sections">
        <button class="tab active" type="button" data-view="executive">Forecast</button>
        <button class="tab" type="button" data-view="dealers">Dealer Queue</button>
        <button class="tab" type="button" data-view="territory">Territory</button>
        <button class="tab" type="button" data-view="quality">Data Trust</button>
      </div>
      <div class="filters">
        <label>
          <span>Region</span>
          <select id="regionFilter"></select>
        </label>
        <label>
          <span>Channel</span>
          <select id="channelFilter"></select>
        </label>
      </div>
    </section>

    <section id="viewRoot" class="view-root" aria-live="polite"></section>
  </main>

  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
